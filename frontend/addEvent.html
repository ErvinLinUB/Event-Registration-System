<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Event</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <span class="brand-dot"></span>
      Event Registration System
    </a>
    <ul class="navbar-links">
      <li><a href="addStudent.html">Students</a></li>
      <li><a href="addEvent.html" class="active">Events</a></li>
      <li><a href="registration.html">Register</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">

    <div class="page-header">
      <h2>Add Event</h2>
      <p class="subtitle">Create a new event for students to register in</p>
    </div>

    <div class="container">
      <form id="eventForm">

        <div class="form-group">
          <label for="eventname">Event Name</label>
          <input id="eventname" placeholder="e.g. Sports Day" required>
        </div>

        <div class="form-group">
          <label for="eventdate">Event Date</label>
          <input id="eventdate" type="date" required>
        </div>

        <div class="form-group">
          <label for="maxparticipants">Max Participants</label>
          <input id="maxparticipants" type="number" placeholder="e.g. 50" min="1" required>
        </div>

        <button type="submit">Add Event</button>

      </form>

      <p id="message"></p>
    </div>

  </div>

  <script src="eventScript.js"></script>
</body>
</html>
