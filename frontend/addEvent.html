<!DOCTYPE html>
<html>
<head>
  <title>Add Event</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Add Event</h2>

  <form id="eventForm">
    <input id="eventname" placeholder="Event Name" required>
    <input id="eventdate" placeholder="Event Date (YYYY-MM-DD)" type="date" required>
    <input id="maxparticipants" placeholder="Max Participants" type="number" required>
    <button type="submit">Add Event</button>
  </form>

  <p id="message"></p>

  <script src="eventScript.js"></script>
</body>
</html>
